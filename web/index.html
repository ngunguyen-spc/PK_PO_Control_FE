<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta content="A new Flutter project." name="description">

    <!-- iOS meta tags & icons -->
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <meta content="flutter_web_app" name="apple-mobile-web-app-title">
    <link href="icons/Icon-192.png" rel="apple-touch-icon">

    <!-- Favicon -->
    <link href="favicon.png" rel="icon" type="image/png"/>

    <title>Packing PO Monitoring</title>
    <link href="manifest.json" rel="manifest">

    <script>
        // TẮT SERVICE WORKER HOÀN TOÀN
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for (let r of regs) r.unregister();
            });
        }

        // CONFIG CANVASKIT TỪ SERVER 8381
        self.flutterConfiguration = {
            canvasKitBaseUrl: "http://192.168.122.15:8381/"
        };
    </script>

    <script defer src="flutter_bootstrap.js"></script>
</head>
<body>
<script>
    window.addEventListener('load', function (ev) {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
</script>
</body>
</html>
